<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">🍣 Sakura Sushi</div>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="about.html">About</a>
        <a id="admin-link" href="admin.html" style="display:none;">Admin Dashboard</a>
    </nav>

    <div class="auth-buttons">
        <a id="login-link" href="auth.html" class="login-btn">Login</a>
    </div>
</header>

<section style="padding: 40px; text-align: center;">

    <h1>My Account</h1>

    <div id="account-info" style="margin-top: 20px;"></div>

    <h2 style="margin-top: 40px;">Order History</h2>

    <div id="order-history">
        <p>No orders yet.</p>
    </div>

</section>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

    updateAuthUI();

    const email = localStorage.getItem("email")?.trim().toLowerCase();
    const role = localStorage.getItem("role");

    const accountContainer = document.getElementById("account-info");
    const orderContainer = document.getElementById("order-history");

    if (!email) {
        accountContainer.innerHTML = "<p>You are not logged in.</p>";
        return;
    }

    // ACCOUNT INFO
    accountContainer.innerHTML = `
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Role:</strong> ${role}</p>
    `;

    try {
        const res = await fetch(
    `http://localhost:3000/my-orders?email=${encodeURIComponent(email)}`
);
        const data = await res.json();

        console.log("ORDERS:", data);

        if (!data.length) {
            orderContainer.innerHTML = "<p>No orders yet.</p>";
            return;
        }

        orderContainer.innerHTML = data.map(order => `
            <div class="order-card">
                <p><strong>Total:</strong> $${Number(order.total).toFixed(2)}</p>
                <p><strong>Status:</strong> ${order.status}</p>

                <ul>
                    ${order.items.map(i => `<li>${i.name} x${i.quantity}</li>`).join("")}
                </ul>
            </div>
        `).join("");

    } catch (err) {
        console.log(err);
        orderContainer.innerHTML = "<p>Failed to load orders</p>";
    }

});
</script>
</body>
</html>
